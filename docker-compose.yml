
services:
  # 1. Redis Session Memory Store
  redis:
    image: redis:alpine
    container_name: tamiledu-redis
    ports:
      - "6379:6379"
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 2. FastAPI Generation Service
  generation-service:
    build:
      context: ./backend/generation-service
      dockerfile: Dockerfile
    container_name: tamiledu-generation
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. FastAPI Retrieval Service
  retrieval-service:
    build:
      context: ./backend/retrieval-service
      dockerfile: Dockerfile
    container_name: tamiledu-retrieval
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. FastAPI Correction Service
  correction-service:
    build:
      context: ./backend/correction-service
      dockerfile: Dockerfile
    container_name: tamiledu-correction
    ports:
      - "8002:8002"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tamiledu-frontend
    ports:
      - "3000:3000"
    depends_on:
      retrieval-service:
        condition: service_healthy
      generation-service:
        condition: service_healthy
      correction-service:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
