version: '3.8'

services:
  # 1. Redis Session Memory Store
  redis:
    image: redis:alpine
    container_name: tamiledu-redis
    ports:
      - "6379:6379"
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 2. FastAPI Generation Service
  generation-service:
    build:
      context: ./backend/generation-service
      dockerfile: Dockerfile
    container_name: tamiledu-generation
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: always

volumes:
  redis_data:
